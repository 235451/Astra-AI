<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        // Intercept and suppress benign WebSocket and Vite HMR connection errors
        const isBenignWSError = function(msg) {
          if (!msg) return false;
          const s = String(msg).toLowerCase();
          return s.includes('websocket') || s.includes('failed to connect') || s.includes('closed without opened') || s.includes('hmr');
        };

        const suppressEvent = function(e, val) {
          if (isBenignWSError(val) || isBenignWSError(e.message) || isBenignWSError(e.reason)) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            return true;
          }
          return false;
        };

        window.addEventListener('error', function(e) {
          suppressEvent(e, e.message || (e.error && e.error.message));
        }, true);

        window.addEventListener('unhandledrejection', function(e) {
          suppressEvent(e, e.reason || (e.reason && e.reason.message));
        }, true);

        // Intercept WebSocket creation to handle Vite's connection failures gracefully
        const OriginalWebSocket = window.WebSocket;
        if (OriginalWebSocket) {
          const WrappedWebSocket = function(url, protocols) {
            if (typeof url === 'string' && (url.includes('vite') || url.includes('hmr') || url.includes('ws') || url.includes('3000'))) {
              const listeners = {};
              const mockWS = {
                url: url,
                readyState: 1, // OPEN (1)
                bufferedAmount: 0,
                extensions: "",
                protocol: "",
                binaryType: "blob",
                onopen: null,
                onerror: null,
                onclose: null,
                onmessage: null,
                send: function(data) {
                  // No-op - keep connection quiet
                },
                close: function() {
                  this.readyState = 3; // CLOSED
                  setTimeout(() => {
                    const closeEvt = { type: 'close', target: mockWS, code: 1000, reason: "Closed", wasClean: true };
                    if (typeof mockWS.onclose === 'function') {
                      try { mockWS.onclose(closeEvt); } catch (err) {}
                    }
                    if (listeners['close']) {
                      listeners['close'].forEach(function(l) {
                        try { l(closeEvt); } catch (err) {}
                      });
                    }
                  }, 5);
                },
                addEventListener: function(type, listener) {
                  if (!listeners[type]) listeners[type] = [];
                  listeners[type].push(listener);
                  
                  // Instantly resolve 'open' event listener triggers
                  if (type === 'open') {
                    setTimeout(() => {
                      try {
                        listener({ type: 'open', target: mockWS });
                      } catch (err) {}
                    }, 5);
                  }
                },
                removeEventListener: function(type, listener) {
                  if (listeners[type]) {
                    listeners[type] = listeners[type].filter(function(l) { return l !== listener; });
                  }
                },
                dispatchEvent: function() { return true; }
              };
              
              // Resolve '.onopen' properties defined shortly after initialization
              setTimeout(() => {
                if (typeof mockWS.onopen === 'function') {
                  try {
                    mockWS.onopen({ type: 'open', target: mockWS });
                  } catch (err) {}
                }
              }, 10);
              
              return mockWS;
            }
            return new OriginalWebSocket(url, protocols);
          };

          WrappedWebSocket.prototype = OriginalWebSocket.prototype;
          WrappedWebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
          WrappedWebSocket.OPEN = OriginalWebSocket.OPEN;
          WrappedWebSocket.CLOSING = OriginalWebSocket.CLOSING;
          WrappedWebSocket.CLOSED = OriginalWebSocket.CLOSED;
          
          window.WebSocket = WrappedWebSocket;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
